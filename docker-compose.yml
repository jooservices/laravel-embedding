version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: laravel_embedding_postgres
    environment:
      POSTGRES_USER: embedding
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: embedding_test
    ports:
      # Non-conflicting host port 54321 -> container 5432
      - "54321:5432"
    volumes:
      - laravel_embedding_pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U embedding -d embedding_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: laravel_embedding_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: embedding
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: embedding_test
    ports:
      # Non-conflicting host port 27018 -> container 27017
      - "27018:27017"
    volumes:
      - laravel_embedding_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  laravel_embedding_pgsql_data:
    driver: local
  laravel_embedding_mongo_data:
    driver: local
